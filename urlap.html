<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="FULABV">
    <title>Mestermű - Jelentkezési Űrlap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Spectral:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stilus.css">
</head>
<body class="alap-hater">

    <nav class="navbar navbar-expand-lg fix-fejlec">
        <div class="container">
            <a class="navbar-brand logo-szoveg" href="index.html" target="_self">🌐 FULABV Portál</a>
            <div class="collapse navbar-collapse show">
                <ul class="navbar-nav ms-auto flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html" target="_self">Főoldal</a></li>
                    <li class="nav-item"><a class="nav-link" href="vers.html" target="_self">Vers & Kód</a></li>
                    <li class="nav-item"><a class="nav-link" href="sport.html" target="_self">Sport & Táblázat</a></li>
                    <li class="nav-item"><a class="nav-link" href="kirandulas.html" target="_self">Kirándulás & Tech</a></li>
                    <li class="nav-item"><a class="nav-link aktiv-oldal" href="urlap.html" target="_self">Jelentkezés</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="urlap-kontener">
                    <h1 class="cim-allura text-center mb-4">Esemény Jelentkezés</h1>
                    <form action="#" method="POST" target="_blank">
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="teljes-nev" class="urlap-cimke">Teljes név:</label>
                                <input type="text" id="teljes-nev" name="nev" class="urlap-mezo" placeholder="Pl.: Minta János" required>
                            </div>
                            <div class="col-md-6">
                                <label for="azonosito-kod" class="urlap-cimke">Azonosító kód (Neptun):</label>
                                <input type="text" id="azonosito-kod" name="azonosito" class="urlap-mezo" placeholder="Pl.: FULABV" maxlength="6">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="email-cim" class="urlap-cimke">E-mail cím:</label>
                            <input type="email" id="email-cim" name="email" class="urlap-mezo" placeholder="janos@madynform.eu" required>
                        </div>
                        <div class="mb-4">
                            <label for="esemeny-valaszto" class="urlap-cimke">Válaszd ki az eseményt:</label>
                            <select id="esemeny-valaszto" name="esemeny" class="urlap-mezo">
                                <option value="borzsony">Autóbuszos kirándulás a Börzsönybe</option>
                                <option value="taekwondo">Országos Bajnokság 2023</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="urlap-cimke d-block">Jogviszony:</label>
                            <div class="radiogomb-csoport">
                                <label class="radiogomb-cimke"><input type="radio" name="jogviszony" value="hallgato" checked> Hallgató</label>
                                <label class="radiogomb-cimke"><input type="radio" name="jogviszony" value="oktato"> Oktató</label>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="megjegyzes-doboz" class="urlap-cimke">Megjegyzés:</label>
                            <textarea id="megjegyzes-doboz" name="megjegyzes" class="urlap-mezo-hosszu" placeholder="Egyedi kérések..."></textarea>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" id="feltetelek-elfogadasa" name="feltetelek" class="form-check-input" required>
                            <label for="feltetelek-elfogadasa" class="form-check-label sorszintu-szoveg">Elfogadom a <mark class="kiemeles">feltételeket</mark>.</label>
                        </div>
                        <div class="text-center mt-5">
                            <button type="submit" class="gomb-elsodleges">Jelentkezés beküldése</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="lablec text-center">
        <p>&copy; 2026 FULABV</p>
    </footer>
</body>
</html>
